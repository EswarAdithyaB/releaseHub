<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Release Hub | Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080f1f;
  --bg2:      #0d1628;
  --bg3:      #111d35;
  --bg4:      #172244;
  --bg5:      #1e2c52;
  --bg6:      #253460;
  --primary:  #5da5f5;
  --primary2: #3d8ee8;
  --teal:     #34d5a8;
  --teal2:    #1fb88d;
  --amber:    #f0b429;
  --red:      #f87171;
  --red2:     #ef4444;
  --purple:   #a78bfa;
  --text:     #e2eaf8;
  --text2:    #a0b4d0;
  --text3:    #5a7498;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.1);
  --glow-primary: rgba(93,165,245,0.15);
  --glow-teal: rgba(52,213,168,0.12);
  --nav-w: 230px;
  --header-h: 54px;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg6); }

/* ─── LAYOUT ─── */
.shell { display: flex; height: 100vh; }

/* ─── SIDEBAR ─── */
aside {
  width: var(--nav-w);
  min-width: var(--nav-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 20;
}

.logo-wrap {
  padding: 20px 18px 22px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  box-shadow: 0 0 20px rgba(93,165,245,0.3);
}
.logo-mark svg { width: 18px; height: 18px; color: #fff; }
.logo-title { font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 800; color: #f0f6ff; }
.logo-sub { font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em; color: rgba(93,165,245,0.5); font-weight: 700; margin-top: 1px; }

nav { padding: 10px 8px; flex: 1; }
.nav-section-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--text3); font-weight: 700; padding: 10px 10px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  font-size: 12px; font-weight: 600; color: var(--text3);
  cursor: pointer; transition: all 0.15s;
  text-decoration: none; position: relative;
  margin-bottom: 2px;
  border: 1px solid transparent;
  letter-spacing: 0.01em;
}
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-item:hover { color: var(--text2); background: rgba(255,255,255,0.03); }
.nav-item.active {
  color: var(--primary);
  background: rgba(93,165,245,0.1);
  border-color: rgba(93,165,245,0.15);
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 25%; bottom: 25%;
  width: 3px; background: var(--primary);
  border-radius: 0 4px 4px 0; left: -8px;
}
.nav-badge {
  margin-left: auto; background: var(--red2);
  color: white; font-size: 9px; font-weight: 700;
  padding: 1px 6px; border-radius: 20px;
}

.user-footer {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--bg5), var(--bg6));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: var(--primary);
  border: 1px solid rgba(93,165,245,0.2);
  flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 700; color: var(--text); }
.user-email { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* ─── MAIN AREA ─── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 20px; }
.header-title { font-family: 'Manrope', sans-serif; font-size: 18px; font-weight: 900; color: var(--primary); }

.release-tabs { display: flex; gap: 2px; }
.rtab {
  padding: 5px 14px; font-size: 12px; font-weight: 600;
  background: none; border: none; color: var(--text3);
  cursor: pointer; transition: all 0.15s;
  border-bottom: 2px solid transparent;
  font-family: 'DM Sans', sans-serif;
}
.rtab:hover { color: var(--text2); }
.rtab.active { color: var(--primary); border-bottom-color: var(--primary); }

.header-right { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  background: none; border: 1px solid var(--border);
  color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative;
}
.icon-btn:hover { background: var(--bg3); color: var(--text2); }
.icon-btn svg { width: 15px; height: 15px; }
.notif-dot {
  position: absolute; top: 7px; right: 7px;
  width: 6px; height: 6px;
  background: var(--red2); border-radius: 50%;
  border: 2px solid var(--bg2);
}
.head-avatar {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--bg5), var(--bg6));
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: var(--primary);
  border: 1px solid rgba(93,165,245,0.2);
  cursor: pointer;
}

/* ─── PAGES ─── */
.page { flex: 1; overflow-y: auto; padding: 24px; display: none; }
.page.active { display: block; }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 7px;
  font-size: 11px; font-weight: 700; cursor: pointer;
  border: none; transition: all 0.15s; letter-spacing: 0.02em;
  font-family: 'DM Sans', sans-serif;
  text-transform: uppercase;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary2));
  color: white; box-shadow: 0 2px 12px rgba(93,165,245,0.25);
}
.btn-primary:hover { box-shadow: 0 4px 20px rgba(93,165,245,0.4); transform: translateY(-1px); }
.btn-ghost { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg5); color: var(--text); }
.btn-teal { background: rgba(52,213,168,0.15); color: var(--teal); border: 1px solid rgba(52,213,168,0.25); }
.btn-teal:hover { background: rgba(52,213,168,0.25); }
.btn-red { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.btn-sm { padding: 4px 10px; font-size: 10px; }
.btn svg { width: 12px; height: 12px; }

/* ─── STATUS CHIPS ─── */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em;
  white-space: nowrap; border: 1px solid;
}
.chip-teal  { background: rgba(52,213,168,0.1); color: var(--teal); border-color: rgba(52,213,168,0.25); }
.chip-blue  { background: rgba(93,165,245,0.1); color: var(--primary); border-color: rgba(93,165,245,0.25); }
.chip-red   { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
.chip-gray  { background: rgba(160,180,208,0.08); color: var(--text3); border-color: rgba(160,180,208,0.15); }
.chip-amber { background: rgba(240,180,41,0.1); color: var(--amber); border-color: rgba(240,180,41,0.2); }
.chip-purple{ background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
.chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ─── PANEL / CARD ─── */
.panel {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  background: var(--bg4);
  border-bottom: 1px solid var(--border);
}
.panel-header h3 { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.panel-header h3 svg { width: 14px; height: 14px; color: var(--primary); }

/* ─── AVATAR ─── */
.avatar {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800;
  border: 1px solid var(--border2);
  flex-shrink: 0;
}

/* ─── PAGE HEADER ─── */
.page-title {
  font-family: 'Manrope', sans-serif;
  font-size: 24px; font-weight: 900; color: var(--text);
}
.page-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
.dash-hero { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
.releases-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 24px; }
.rel-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 18px;
  border-top: 3px solid;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.rel-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.rel-card-id { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 14px; }
.rel-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
.rel-row .lbl { color: var(--text3); }
.rel-row .val { font-weight: 700; }
.prog-wrap { margin: 10px 0 6px; }
.prog-bar { height: 3px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; }
.prog-labels { display: flex; justify-content: space-between; font-size: 9px; font-weight: 700; margin-bottom: 4px; }
.rel-status { display: flex; align-items: center; gap: 6px; margin-top: 12px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; }
.status-text { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
.urgent-tag {
  position: absolute; top: 6px; right: -16px;
  background: var(--red2); color: white; font-size: 8px; font-weight: 700;
  padding: 2px 22px; transform: rotate(30deg); letter-spacing: 0.1em; text-transform: uppercase;
}

.dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.action-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.action-item:last-child { border-bottom: none; }
.action-item:hover { background: rgba(255,255,255,0.015); }
.action-icon {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 15px;
}
.action-info { flex: 1; min-width: 0; }
.action-title { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.action-desc { font-size: 10px; color: var(--text3); margin-top: 2px; }
.action-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.dismiss-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 4px; line-height: 1; }
.dismiss-btn:hover { color: var(--red); }

.health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
.health-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
}
.health-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.health-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px; }
.health-val { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 900; }
.health-sub { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
.spark-bars { display: flex; align-items: flex-end; gap: 3px; height: 32px; }
.spark-bar { width: 4px; border-radius: 2px 2px 0 0; }

.quick-panel { display: flex; flex-direction: column; gap: 0; }
.quick-item {
  display: flex; align-items: center; padding: 14px 18px;
  border-bottom: 1px solid var(--border); gap: 12px;
  cursor: pointer; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.quick-item:last-child { border-bottom: none; }
.quick-item:hover { background: rgba(255,255,255,0.02); }
.quick-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px;
}
.quick-title { font-size: 12px; font-weight: 700; }
.quick-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.quick-arrow { margin-left: auto; color: var(--text3); }
.quick-arrow svg { width: 12px; height: 12px; }

/* ══════════════════════════════════════
   RELEASE MANAGEMENT
══════════════════════════════════════ */
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text3); font-weight: 700; margin-bottom: 6px; }
.breadcrumb .curr { color: var(--primary); }
.breadcrumb svg { width: 10px; height: 10px; }

.rel-page-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 16px; }
.rel-id-tag {
  font-size: 10px; font-weight: 500; background: var(--bg4);
  padding: 3px 8px; border-radius: 4px; color: var(--text3);
  font-family: 'JetBrains Mono', monospace; border: 1px solid var(--border);
}

.env-summary {
  display: flex; align-items: center; gap: 20px;
  background: rgba(58,74,95,0.15);
  border: 1px solid var(--border2);
  border-radius: 10px; padding: 14px 22px;
  flex-shrink: 0;
}
.env-stat .es-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.env-stat .es-val { font-family: 'Manrope', sans-serif; font-size: 18px; font-weight: 900; }
.env-divider { width: 1px; height: 38px; background: var(--border2); }

.tbl-filters { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.search-wrap { position: relative; flex: 1; max-width: 360px; }
.search-wrap input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 12px 8px 34px;
  font-size: 12px; color: var(--text); outline: none; font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: rgba(93,165,245,0.4); }
.search-wrap input::placeholder { color: var(--text3); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.search-icon svg { width: 14px; height: 14px; }
.sort-sel {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 12px; font-size: 11px;
  color: var(--text2); outline: none; font-family: 'DM Sans', sans-serif; cursor: pointer;
}

.tbl-head {
  display: grid; grid-template-columns: 5fr 2fr 2fr 3fr;
  gap: 12px; padding: 10px 18px;
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--text3); margin-bottom: -1px;
}
.tbl-head div:last-child { text-align: right; }

.stories-wrap { border: 1px solid var(--border); border-radius: 0 0 8px 8px; overflow: hidden; }

.story-group { border-bottom: 1px solid var(--border); }
.story-group:last-child { border-bottom: none; }

.story-row {
  display: grid; grid-template-columns: 5fr 2fr 2fr 3fr;
  gap: 12px; padding: 14px 18px;
  background: var(--bg3); align-items: center;
  cursor: pointer; transition: background 0.15s;
  border-left: 3px solid;
}
.story-row:hover { background: var(--bg4); }

.story-expand { transition: transform 0.2s; display: inline-flex; margin-right: 8px; }
.story-expand svg { width: 12px; height: 12px; color: var(--text3); }
.story-expand.open { transform: rotate(90deg); }
.story-name-text { font-size: 12px; font-weight: 700; }
.story-meta { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

.owner-cell { display: flex; align-items: center; gap: 8px; }
.owner-info .owner-name { font-size: 11px; font-weight: 700; }
.owner-info .owner-time { font-size: 9px; color: var(--text3); margin-top: 1px; }

.story-actions { display: flex; justify-content: flex-end; gap: 6px; align-items: center; }
.more-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; font-size: 16px; line-height: 1; }
.more-btn:hover { color: var(--text2); }

.apps-wrap { display: none; border-top: 1px solid var(--border); }
.apps-wrap.open { display: block; }

.app-row {
  display: grid; grid-template-columns: 5fr 2fr 2fr 3fr;
  gap: 12px; padding: 10px 18px 10px 36px;
  background: rgba(8,15,31,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  align-items: center;
  border-left: 3px solid transparent;
}
.app-row:last-child { border-bottom: none; }
.app-name-text { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
.app-branch { font-size: 9px; color: var(--primary); font-family: 'JetBrains Mono', monospace; margin-top: 3px; display: flex; align-items: center; gap: 4px; }
.app-branch svg { width: 10px; height: 10px; }

/* bento */
.bento-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-top: 20px; }
.bento-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.bento-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text3); display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.bento-lbl svg { width: 14px; height: 14px; }
.bento-big { font-family: 'Manrope', sans-serif; font-size: 32px; font-weight: 900; }

.conflict-item { background: var(--bg4); border-radius: 6px; padding: 10px 12px; border-left: 2px solid; margin-bottom: 8px; }
.conflict-title { font-size: 11px; font-weight: 700; }
.conflict-sub { font-size: 9px; color: var(--text3); margin-top: 2px; }

/* timeline */
.timeline-widget { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-top: 14px; }
.tl-steps { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-top: 20px; position: relative; }
.tl-line-bg { position: absolute; left: 10%; right: 10%; top: 11px; height: 1px; background: var(--border2); z-index: 0; }
.tl-step { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; position: relative; z-index: 1; }
.tl-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg3); border: 2px solid; }
.tl-dot svg { width: 12px; height: 12px; }
.tl-step-name { font-size: 10px; font-weight: 700; }
.tl-step-status { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
.tl-step-date { font-size: 8px; color: var(--text3); }

/* ══════════════════════════════════════
   DEPLOYMENT QUEUE
══════════════════════════════════════ */
.dq-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 22px; }
.dq-stat {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px; position: relative; overflow: hidden;
}
.dq-stat.highlight { border-bottom: 3px solid var(--primary); }
.dq-stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 6px; }
.dq-stat-value { font-family: 'Manrope', sans-serif; font-size: 26px; font-weight: 900; font-variant-numeric: tabular-nums; }
.dq-stat-icon { position: absolute; right: -6px; bottom: -6px; font-size: 48px; opacity: 0.07; }

.dq-layout { display: grid; grid-template-columns: 1fr 260px; gap: 16px; }

.queue-table { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.qt-head {
  display: grid; grid-template-columns: 2fr 2.5fr 80px 120px 130px;
  gap: 8px; padding: 11px 20px;
  background: var(--bg4); border-bottom: 1px solid var(--border);
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text3);
}
.qt-head div:last-child { text-align: right; }
.qt-row {
  display: grid; grid-template-columns: 2fr 2.5fr 80px 120px 130px;
  gap: 8px; padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center; transition: background 0.15s;
}
.qt-row:last-child { border-bottom: none; }
.qt-row:hover { background: rgba(255,255,255,0.02); }
.qt-app-icon { width: 32px; height: 32px; border-radius: 7px; background: rgba(93,165,245,0.08); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.qt-app-name { font-size: 12px; font-weight: 700; }
.qt-app-cid { font-size: 9px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.qt-branch-text { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text2); display: flex; align-items: center; gap: 5px; }
.qt-branch-text svg { width: 10px; height: 10px; color: var(--text3); flex-shrink: 0; }
.env-tag {
  display: inline-block; font-size: 9px; font-weight: 800;
  padding: 3px 8px; border-radius: 5px; text-transform: uppercase; letter-spacing: 0.06em;
}
.env-sit { background: rgba(93,165,245,0.12); color: var(--primary); border: 1px solid rgba(93,165,245,0.25); }
.env-nft { background: rgba(52,213,168,0.1); color: var(--teal); border: 1px solid rgba(52,213,168,0.2); }
.qt-status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--teal); }
.pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }

.dq-sidebar { display: flex; flex-direction: column; gap: 14px; }
.windows-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; border-left: 3px solid var(--primary); padding: 18px; }
.wc-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--primary); margin-bottom: 16px; }
.window-item { padding-left: 16px; border-left: 1px solid rgba(255,255,255,0.1); position: relative; margin-bottom: 18px; }
.window-item:last-child { margin-bottom: 0; }
.window-item::before { content: ''; position: absolute; left: -5px; top: 3px; width: 9px; height: 9px; border-radius: 50%; border: 3px solid var(--bg); }
.window-item.wi-active::before { background: var(--primary); }
.window-item.wi-dim::before { background: var(--text3); }
.window-title { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
.window-time { font-size: 10px; color: var(--text3); }
.window-countdown { font-size: 9px; font-family: 'JetBrains Mono', monospace; background: var(--bg4); padding: 4px 8px; border-radius: 5px; color: var(--primary); display: inline-block; margin-top: 6px; }

function filterStories(q) { searchQuery = q.toLowerCase(); renderStories(); }

function renderStories() {
  const wrap = document.getElementById('stories-wrap');
  if (!wrap) return;
  const sort = document.getElementById('story-sort')?.value || 'recent';
  let stories = [...MOCK.stories];

  if (searchQuery) {
    stories = stories.filter(s =>
      s.name.toLowerCase().includes(searchQuery) ||
      s.id.toLowerCase().includes(searchQuery) ||
      s.owner.toLowerCase().includes(searchQuery) ||
      s.apps.some(a => a.name.includes(searchQuery) || a.branch.includes(searchQuery))
    );
  }
  if (sort === 'id') stories.sort((a,b) => a.id.localeCompare(b.id));
  if (sort === 'failures') stories.sort((a,b) => (b.locked?1:0)-(a.locked?1:0));

  wrap.innerHTML = stories.map(s => {
    const isOpen = openStories.has(s.id);
    return `
      <div class="story-group" id="sg-${s.id}">
        <div class="story-row" style="border-left-color:${s.borderColor};" onclick="toggleStory('${s.id}')">
          <div style="display:flex;align-items:flex-start;gap:0;">
            <span class="story-expand ${isOpen?'open':''}" id="exp-${s.id}">${svg('<polyline points="9 18 15 12 9 6"/>')}</span>
            <div>
              <div class="story-name-text">${s.id}: ${s.name}</div>
              <div class="story-meta">Parent Story · ${s.apps.length} application${s.apps.length!==1?'s':''}</div>
            </div>
          </div>
          <div class="owner-cell">
            <div class="avatar" style="background:${s.avatarBg};color:${s.avatarColor};">${s.initials}</div>
            <div class="owner-info"><div class="owner-name">${s.owner}</div><div class="owner-time">${s.time}</div></div>
          </div>
          <div style="text-align:center;"><span class="chip ${s.chip}"><span class="chip-dot"></span>${s.chipLabel}</span></div>
          <div class="story-actions" onclick="event.stopPropagation()">
            ${s.locked
              ? '<button class="btn btn-ghost btn-sm" style="opacity:0.45;cursor:not-allowed;" disabled>SIT Locked</button>'
              : '<button class="btn btn-teal btn-sm" onclick="showToast(\'SIT request submitted!\')">Request SIT</button>'
            }
            <button class="more-btn">⋯</button>
          </div>
        </div>
        <div class="apps-wrap ${isOpen?'open':''}" id="apps-${s.id}">
          ${s.apps.map(a => `
            <div class="app-row">
              <div>
                <div class="app-name-text">⬡ ${a.name}</div>
                <div class="app-branch">${branchSvg} ${a.branch}</div>
              </div>
              <div class="owner-cell">
                <div class="avatar" style="background:${a.avBg};color:${a.avColor};font-size:8px;">${a.initials}</div>
                <div style="font-size:10px;font-weight:700;">${a.owner}</div>
              </div>
              <div style="text-align:center;"><span class="chip ${a.chip}"><span class="chip-dot"></span>${a.chipLabel}</span></div>
              <div class="story-actions">
                <button class="btn ${a.actionClass}" ${a.disabled?'style="opacity:0.4;cursor:not-allowed;" disabled':''} onclick="showToast('${a.actionLabel} triggered')">${a.actionLabel}</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleStory(id) {
  if (openStories.has(id)) openStories.delete(id);
  else openStories.add(id);
  const appsEl = document.getElementById('apps-'+id);
  const expEl  = document.getElementById('exp-'+id);
  if (appsEl) appsEl.classList.toggle('open', openStories.has(id));
  if (expEl)  expEl.classList.toggle('open', openStories.has(id));
}

function renderTimeline() {
  const c = document.getElementById('tl-steps');
  if (!c) return;
  MOCK.timeline.forEach(step => {
    const color = step.done ? 'var(--teal)' : step.active ? 'var(--primary)' : 'var(--text3)';
    const opacity = (!step.done && !step.active) ? 'opacity:0.55;' : '';
    const d = document.createElement('div');
    d.className = 'tl-step';
    d.style.cssText = opacity;
    d.innerHTML = `
      <div class="tl-dot" style="border-color:${color};">
        ${step.done ? `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" style="width:11px;height:11px;"><polyline points="20 6 9 17 4 12"/></svg>`
          : step.active ? `<span style="width:8px;height:8px;border-radius:50%;background:var(--primary);display:block;animation:pulseGrow 1.8s infinite;"></span>`
          : `<span style="width:7px;height:7px;border-radius:50%;border:1px solid ${color};display:block;"></span>`}
      </div>
      <div class="tl-step-name">${step.name}</div>
      <div class="tl-step-status" style="color:${color};">${step.status}</div>
      <div class="tl-step-date">${step.date}</div>
    `;
    c.appendChild(d);
  });
}

/* ═══════════════════════ TOAST ═══════════════════════ */
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:var(--bg4);border:1px solid var(--border2);border-left:3px solid var(--primary);color:var(--text);padding:12px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:fadeUp 0.2s ease;`;
  t.textContent = '✓  ' + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ═══════════════════════ COUNTDOWN TIMER ═══════════════════════ */
let sitSeconds = 2*3600+14*60+55;
let nftSeconds = 18*3600+45*60+10;
setInterval(() => {
  if (sitSeconds > 0) sitSeconds--;
  if (nftSeconds > 0) nftSeconds--;
  const fmt = s => `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const dqVals = document.querySelectorAll('.dq-stat-value');
  if (dqVals[1]) dqVals[1].textContent = fmt(sitSeconds);
  if (dqVals[2]) dqVals[2].textContent = fmt(nftSeconds);
  const uw = document.querySelectorAll('.window-countdown');
  if (uw[0]) uw[0].textContent = 'Starts in ' + fmt(sitSeconds);
}, 1000);

/* ═══════════════════════ INIT ═══════════════════════ */

renderRelease();
renderQueue();
</script>
