<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Release Hub | Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- ─── Stylesheets (load order matters) ─── -->
<link rel="stylesheet" href="css/variables.css"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/dashboard.css"/>
<link rel="stylesheet" href="css/release.css"/>
<link rel="stylesheet" href="css/queue.css"/>
<link rel="stylesheet" href="css/branches.css"/>

<style>
/* ─── User footer with role badge ─── */
.user-role-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em;
  border: 1px solid; margin-top: 3px;
}
.user-footer-inner { flex: 1; min-width: 0; }
.user-footer-actions { display: flex; gap: 4px; align-items: center; }
.logout-btn {
  width: 28px; height: 28px; border-radius: 7px;
  background: none; border: 1px solid var(--border);
  color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.logout-btn:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); color: var(--red); }
.logout-btn svg { width: 13px; height: 13px; }

/* ─── Nav item locked (no permission) ─── */
.nav-item.locked { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
.nav-item .nav-lock { margin-left: auto; opacity: 0.5; }
.nav-item .nav-lock svg { width: 11px; height: 11px; }

/* ─── Readonly banner ─── */
.readonly-banner {
  display: flex; align-items: center; gap: 8px;
  background: rgba(240,180,41,0.07); border: 1px solid rgba(240,180,41,0.2);
  border-radius: 8px; padding: 8px 14px; margin-bottom: 16px;
  font-size: 11px; color: var(--amber); font-weight: 600;
}
.readonly-banner svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ─── Role indicator chip in header ─── */
.role-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em;
  border: 1px solid;
}

html.light .logout-btn { border-color: rgba(0,174,239,0.18); }
html.light .logout-btn:hover { background: rgba(220,38,38,0.06); border-color: rgba(220,38,38,0.2); }
html.light .readonly-banner { background: rgba(217,119,6,0.06); border-color: rgba(217,119,6,0.2); }
</style>
</head>
<body>

<!-- auth.js must run first before anything else -->
<script src="js/auth.js"></script>
<script>
  /* ─── Guard: redirect to login if not authenticated ─── */
  if (!Auth.requireAuth()) { /* stops execution if redirecting */ }

  /* ─── Apply saved theme ─── */
  (function() {
    const saved = localStorage.getItem('rh-theme');
    if (saved === 'light') {
      document.documentElement.classList.remove('dark');
      document.documentElement.classList.add('light');
    }
  })();
</script>

<div class="shell">
  <!-- ─── SIDEBAR ─── -->
  <aside>
    <div class="logo-wrap">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </div>
      <div class="logo-title">Release Hub</div>
      <div class="logo-sub">Mission Control</div>
    </div>
    <nav id="main-nav">
      <div class="nav-section-label">Navigation</div>
      <a class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a class="nav-item" id="nav-release" onclick="showPage('release')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="6" y1="8" x2="6" y2="16"/><line x1="18" y1="8" x2="18" y2="16"/></svg>
        Release Management
        <span class="nav-badge">3</span>
      </a>
      <a class="nav-item" id="nav-queue" onclick="showPage('queue')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Deployment Queue
      </a>
      <div class="nav-section-label" style="margin-top:10px;">System</div>
      <a class="nav-item" id="nav-branches" onclick="showPage('branches')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
        Branch Management
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Settings
      </a>
    </nav>

    <!-- ─── Logged-in User Footer ─── -->
    <div class="user-footer" id="user-footer">
      <!-- populated by app.js → applyAuthToUI() -->
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <div class="main">
    <header>
      <div class="header-left">
        <span class="header-title">Active Releases</span>
        <!-- Tabs rendered dynamically from DB by app.js → renderReleaseTabs() -->
        <div class="release-tabs" id="release-tabs"></div>
      </div>
      <div class="header-right">
        <!-- Role chip shown in header -->
        <span class="role-chip" id="header-role-chip" style="display:none;"></span>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
          <div class="theme-toggle-thumb">
            <span class="theme-toggle-icon-moon">🌙</span>
            <span class="theme-toggle-icon-sun">☀️</span>
          </div>
        </button>
        <button class="icon-btn" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </button>
        <button class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="head-avatar" id="head-avatar">AT</div>
      </div>
    </header>

    <!-- ══ DASHBOARD ══ -->
    <div class="page active" id="page-dashboard"></div>

    <!-- ══ RELEASE MANAGEMENT ══ -->
    <div class="page" id="page-release"></div>

    <!-- ══ DEPLOYMENT QUEUE ══ -->
    <div class="page" id="page-queue"></div>

    <!-- ══ BRANCH MANAGEMENT ══ -->
    <div class="page" id="page-branches"></div>
  </div>
</div>

<!-- ─── JavaScript (load order matters) ─── -->
<!-- auth.js already loaded in <head> above -->
<script src="js/db.js"></script>
<script src="js/seeds.js"></script>
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/release.js"></script>
<script src="js/queue.js"></script>
<script src="js/branches.js"></script>
<script src="js/app.js"></script>

</body>
</html>
